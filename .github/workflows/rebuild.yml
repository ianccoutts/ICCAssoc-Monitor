## Step 5 — Run it manually the first time

1. Click the **Actions** tab in your repo
2. You'll see **"Rebuild ICC Monitor"** in the left list — click it
3. Click the **"Run workflow"** button (right side) → **Run workflow**
4. A yellow dot appears — click it to watch it run live
5. Goes green ✅ in about 30 seconds — your `index.html` is now live

